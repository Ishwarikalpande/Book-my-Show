<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>details</title>

    <style>
        body{
            background-color: lavender;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1{
            margin-top: 30px;
        }

        .table-container {
            width: fit-content;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        table{
            border-collapse: collapse;
            width: 600px;
        }

        table td, table th{
            border: 1px solid black;
            padding: 10px;
        }

        table tr:nth-child(1){
            background: #d5c4ff;
            font-weight: bold;
        }

        a{
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>Details of theatre in Amravati</h1>

<div class="table-container">
    <table>
        <tr>
            <td>ID</td>
            <td>NAME</td>
            <td>ADDRESS</td>
            <td>SEATING</td>
            <td>SCREEN</td>
        </tr>

        {% for x in movie %}
        <tr>
            <td>{{x.id}}</td>
            <td>{{x.name}}</td>
            <td>{{x.address}}</td>
            <td>{{x.seating}}</td>
            <td>{{x.screen}}</td>
        </tr>
        {% endfor %}
    </table>
</div>

<p>Go to <a href="fourth">Registration page</a></p>
<p>Go to <a href="{% url 'index' %}">Home page</a></p>

</body>
</html>
